      const onDown=(e)=>{down=true;moved=false;sw.classList.add('grabbing');const r=sw.getBoundingClientRect();w=r.width;thumb=parseFloat(getComputedStyle(sw).getPropertyValue('--thumb'))||25;startX=(e.touches?e.touches[0].clientX:e.clientX);try{sw.setPointerCapture&&e.pointerId!=null&&sw.setPointerCapture(e.pointerId);}catch(_){}};
      const onMove=(e)=>{if(!down)return;const x=(e.touches?e.touches[0].clientX:e.clientX);const dx=x-startX;if(Math.abs(dx)>3){moved=true;
        // posizione del pollice durante il drag (solo feedback visivo via on/off al superamento metà)
        const r=sw.getBoundingClientRect();const rel=x-r.left;const mid=r.width/2;setOn(rel>=mid);}
      };
      const onUp=()=>{if(!down)return;down=false;sw.classList.remove('grabbing');if(moved){commit(isOn());moved=false;}};
      sw.addEventListener('pointerdown',onDown);
      sw.addEventListener('pointermove',onMove);
      window.addEventListener('pointerup',onUp);
      sw.addEventListener('click',(e)=>{ if(moved){e.preventDefault();return;} commit(!isOn()); });
      sw.addEventListener('keydown',(e)=>{ if(e.key===' '||e.key==='Enter'){e.preventDefault();commit(!isOn());} });
    });
  };
})();


/* ════════════════════════════════════════════════════════════
   ████  SMART ANIMATE TEXT (cifre animate blur-slide, vanilla)  ████
   Anima per-carattere i numeri che cambiano. Uso:
   <span data-smart>45%</span>  poi  smartText(el,newValue)
   oppure smartTextAll() per inizializzare quelli presenti.
   ════════════════════════════════════════════════════════════ */
(function(){
  if(el('smart-text-css'))return;
  const s=document.createElement('style');s.id='smart-text-css';
  s.textContent=`
  .smart-txt{display:inline-flex;align-items:baseline;gap:2px;font-variant-numeric:tabular-nums}
  .smart-ch{display:inline-block;position:relative;overflow:hidden}
  .smart-ch .smart-in{display:inline-block;animation:smartIn .42s var(--ease) both}
  @keyframes smartIn{from{opacity:0;transform:translateY(var(--sy,18px)) scale(.7);filter:blur(8px)}to{opacity:1;transform:none;filter:blur(0)}}
  @media(prefers-reduced-motion:reduce){.smart-ch .smart-in{animation:none}}`;
  document.head.appendChild(s);

  function render(el,val,dir){
    val=String(val);
    const prev=el._smartVal!=null?String(el._smartVal):'';
    el.classList.add('smart-txt');
    // direzione: up se cresce, down se cala (per numeri)
    let sy=18;
    const pn=parseFloat(prev.replace(/[^0-9.-]/g,'')), nn=parseFloat(val.replace(/[^0-9.-]/g,''));
    if(dir==='up')sy=18; else if(dir==='down')sy=-18;
    else if(!isNaN(pn)&&!isNaN(nn))sy = nn>=pn?18:-18;
    let html='';let i=0;
    for(const ch of val){
      const same=prev[i]===ch;
      if(/[0-9A-Za-z]/.test(ch)){
        html+=`<span class="smart-ch">${same?`<span style="display:inline-block">${esc(ch)}</span>`:`<span class="smart-in" style="--sy:${sy}px;animation-delay:${i*0.04}s">${esc(ch)}</span>`}</span>`;
      }else{
        html+=`<span class="smart-ch"><span style="display:inline-block">${esc(ch)}</span></span>`;
      }
      i++;
    }
    el.innerHTML=html;el._smartVal=val;
  }
  window.smartText=function(elm,val,dir){if(!elm)return;render(elm,val,dir);};
  window.smartTextAll=function(root){(root||document).querySelectorAll('[data-smart]').forEach(e=>{if(e._smartVal==null)render(e,e.textContent.trim());});};
})();

/* ════════════════════════════════════════════════════════════
   ████  PINNED LIST (fissa in alto, vanilla)  ████
   Lista con pin: gli elementi fissati salgono in una sezione
   "Fissati". Stato salvato in localStorage NON usabile negli
   artifact → uso state.ui.pinned (Set) in memoria.
   Uso: pinnedList(items,{key}) dove items=[{id,name,subtitle,icon,href}]
   ════════════════════════════════════════════════════════════ */
(function(){
  if(el('pinned-list-css'))return;
  const s=document.createElement('style');s.id='pinned-list-css';
  s.textContent=`
  .pl-wrap{display:flex;flex-direction:column;gap:6px}
  .pl-head{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);padding:6px 2px 2px}
  .pl-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;text-decoration:none;color:inherit;transition:transform .35s var(--ease-spring),box-shadow .25s,background .2s;box-shadow:var(--shadow-xs)}
  .pl-item:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px)}
  .pl-item.pinned{background:var(--surface-2);border-color:var(--line)}
  .pl-ic{width:42px;height:42px;border-radius:12px;background:var(--ink);color:#E7E7E7;display:grid;place-items:center;flex:0 0 42px}
  .pl-ic svg{width:18px;height:18px}
  .pl-tx{flex:1;min-width:0}
  .pl-tx b{display:block;font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pl-tx small{font-size:12.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  .pl-pin{width:34px;height:34px;border-radius:999px;border:none;flex:0 0 34px;display:grid;place-items:center;cursor:pointer;background:var(--surface-3);color:var(--muted);transition:.2s;-webkit-tap-highlight-color:rgba(0,0,0,0)}
  .pl-pin:hover{background:var(--line)}
  .pl-pin svg{width:16px;height:16px;transition:transform .2s}
  .pl-pin.on{background:var(--accent);color:var(--accent-ink)}
  .pl-pin.on svg{transform:rotate(-45deg)}
  .pl-item.anim{animation:plIn .4s var(--ease-spring) both}
  @keyframes plIn{from{opacity:0;transform:scale(.97) translateY(-6px)}to{opacity:1;transform:none}}`;
  document.head.appendChild(s);

  if(!ICONS.pin)ICONS.pin='<path d="M12 17v5M9 10.76V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v6.76l2 2.24H7z"/>';

  // stato pin in memoria (gli artifact non permettono localStorage)
  state.ui.pinned=state.ui.pinned||{};
  function pinSet(key){state.ui.pinned[key]=state.ui.pinned[key]||new Set();return state.ui.pinned[key];}

  window.pinnedList=function(items,opts){
    opts=opts||{};const key=opts.key||'default';const pins=pinSet(key);
    const pinned=items.filter(i=>pins.has(i.id));
    const rest=items.filter(i=>!pins.has(i.id));
    const row=(it,isP)=>{
      const inner=`<div class="pl-ic">${it.icon||ico('folder')}</div><div class="pl-tx"><b>${esc(it.name)}</b><small>${esc(it.subtitle||'')}</small></div>
        <button type="button" class="pl-pin${isP?' on':''}" data-pin="${esc(it.id)}" data-pinkey="${esc(key)}" aria-label="${isP?'Rimuovi dai fissati':'Fissa in alto'}">${ico('pin')}</button>`;
      return it.href?`<a class="pl-item${isP?' pinned':''} anim" href="${esc(it.href)}">${inner}</a>`:`<div class="pl-item${isP?' pinned':''} anim">${inner}</div>`;
    };
    let html='<div class="pl-wrap">';
    if(pinned.length){html+=`<div class="pl-head">${ico('pin')} Fissati</div>`+pinned.map(i=>row(i,true)).join('');}
    if(rest.length){html+=`<div class="pl-head">${pinned.length?'Tutti':' '}</div>`+rest.map(i=>row(i,false)).join('');}
    html+='</div>';
    return html;
  };
  // delega globale per i pulsanti pin (rirenderizza la vista)
  document.addEventListener('click',function(e){
    const b=e.target.closest&&e.target.closest('[data-pin]');
    if(!b)return;
    e.preventDefault();e.stopPropagation();
    const key=b.dataset.pinkey||'default';const id=b.dataset.pin;const pins=pinSet(key);
    if(pins.has(id))pins.delete(id);else pins.add(id);
    if(typeof render==='function')render();
  });
})();

/* ════════════════════════════════════════════════════════════
   ████  MOTION TABS MENU (tab fluttuante mobile, vanilla)  ████
   Barra fluttuante in basso (solo mobile) con espansione animata
   della pillola attiva. Sostituisce l'aspetto della mbottom.
   ════════════════════════════════════════════════════════════ */
(function(){
  if(el('motion-tabs-css'))return;
  const s=document.createElement('style');s.id='motion-tabs-css';
  s.textContent=`
  @media(max-width:920px){
    .mbottom{background:transparent!important;border:none!important;box-shadow:none!important;padding:0 0 calc(env(safe-area-inset-bottom,0) + 10px)!important;display:flex!important;justify-content:center!important}
    .mtabs{display:inline-flex;align-items:center;gap:4px;background:var(--ink);border-radius:999px;padding:6px;box-shadow:0 12px 34px -10px rgba(0,0,0,.5)}
    .mtab{position:relative;display:inline-flex;align-items:center;gap:7px;border:none;background:transparent;color:#9a9a9a;
      padding:10px 12px;border-radius:999px;font-family:var(--sans);font-weight:700;font-size:13px;cursor:pointer;
      transition:color .25s var(--ease);white-space:nowrap;-webkit-tap-highlight-color:rgba(0,0,0,0)}
    .mtab svg{width:20px;height:20px;flex:0 0 20px}
    .mtab .mtab-l{max-width:0;overflow:hidden;opacity:0;transition:max-width .32s var(--ease),opacity .2s var(--ease) .06s}
    .mtab.active{color:var(--ink);background:#fff}
    .mtab.active .mtab-l{max-width:120px;opacity:1}
    .mtab:active{transform:scaleY(.86)}
  }`;
  document.head.appendChild(s);

  // avvolgo la mbottom in stile motion-tabs dopo ogni renderNav
  if(typeof renderNav==='function'){
    const _origNav=renderNav;
    renderNav=function(){
      _origNav.apply(this,arguments);
      const host=el('mbottom');if(!host)return;
      const items=(typeof navItems==='function'?navItems():NAV);
      host.innerHTML=`<div class="mtabs">${items.map(n=>{
        const active=(state.route===n.id||(n.id==='progetti'&&state.route==='progetto'))?'active':'';
        return `<a class="mtab ${active}" href="#${n.id}">${ico(n.icon)}<span class="mtab-l">${esc(n.label)}</span></a>`;
      }).join('')}</div>`;
    };
  }
})();


/* ════════════════════════════════════════════════════════════
   ████  INTEGRAZIONE dei componenti nei punti d'uso  ████
   ════════════════════════════════════════════════════════════ */
(function(){
  // --- 1) PINNED LIST nei progetti (quando NON c'è ricerca/filtro speciale) ---
  if(typeof viewProjects==='function'){
    const _vp=viewProjects;
    viewProjects=function(){
      const q=(state.ui.search||'').trim();
      // pinned list solo nella vista "tutti/attivi" senza ricerca, per non confondere coi filtri
      const useList = !q && (state.ui.projView==='list');
      const html=_vp.apply(this,arguments);
      if(!useList) return html;
      // costruisco gli item dai progetti correnti
      const all=Object.entries(state.projects).map(([id,p])=>({id,...p}))
        .sort((a,b)=>(b.updatedAt||b.createdAt||0)-(a.updatedAt||a.createdAt||0));
      if(!all.length) return html;
      const items=all.map(p=>{const c=projTaskCounts(p);const pc=pct(c.done,c.tot);return{
        id:p.id,name:p.name,subtitle:`${p.client||'—'} · ${pc}%`,icon:ico(p.icon||'folder'),href:'#progetto/'+p.id
      };});
      // sostituisco la griglia con la pinned list, mantenendo la barra filtri
      const grid=html.indexOf('<div class="proj-grid">');
      if(grid<0||typeof pinnedList!=='function') return html;
      const head=html.slice(0,grid);
      return head+`<div style="margin-top:4px">${pinnedList(items,{key:'projects'})}</div>`;
    };
  }
  // toggle vista lista/griglia nei progetti (aggiunge un bottoncino nella barra filtri)
  state.ui.projView=state.ui.projView||'grid';
  if(typeof wireProjects==='function'){
    const _wp=wireProjects;
    wireProjects=function(){
      _wp.apply(this,arguments);
      // inserisco un toggle vista accanto ai filtri se non c'è
      const seg=document.querySelector('#view .filters .seg');
      if(seg && !document.getElementById('projview-toggle')){
        const b=document.createElement('button');
        b.id='projview-toggle';b.type='button';b.style.cssText='margin-left:8px';
        b.innerHTML = state.ui.projView==='list'?ico('grid'):ico('layers');
        b.title = state.ui.projView==='list'?'Vista griglia':'Vista elenco (con fissati)';
        b.onclick=()=>{state.ui.projView=state.ui.projView==='list'?'grid':'list';render();};
        seg.parentNode.appendChild(b);
      }
    };
  }

  // --- 2) SMART TEXT sui numeri (dashboard stat + status card pct) ---
  function animateNumbers(){
    if(typeof smartText!=='function')return;
    document.querySelectorAll('#view .stat .n, .status-card .sc-remain').forEach(elm=>{
      const txt=elm.textContent.trim();
      if(elm._smartVal!==txt) smartText(elm,txt);
    });
  }
  if(typeof render==='function'){
    const _r=render;
    render=function(){const out=_r.apply(this,arguments);setTimeout(animateNumbers,30);return out;};
  }

  // --- 3) APPLE SWITCH: esempio reale nel menu profilo (preferenza animazioni) ---
  state.ui.prefAnim = state.ui.prefAnim!==false; // default attivo
  if(typeof openProfile==='function'){
    const _op=openProfile;
    openProfile=function(){
      _op.apply(this,arguments);
      setTimeout(()=>{
        const body=document.querySelector('.modal .modal-b, .modal .modal-body, .modal-b, .scrim .modal');
        if(!body||typeof appleSwitch!=='function')return;
        if(document.getElementById('pref-anim-row'))return;
        const row=document.createElement('div');
        row.id='pref-anim-row';row.style.cssText='margin-top:16px;padding-top:14px;border-top:1px solid var(--line-soft);display:flex;justify-content:space-between;align-items:center;gap:12px';
        row.innerHTML=`<div class="asw-txt"><span class="l">Animazioni</span><span class="d">Effetti di movimento nell'interfaccia</span></div>${appleSwitch({id:'pref-anim',checked:state.ui.prefAnim,size:'sm'})}`;
        body.appendChild(row);
        if(typeof wireAppleSwitches==='function')wireAppleSwitches(row,(id,val)=>{
          if(id==='pref-anim'){state.ui.prefAnim=val;document.body.classList.toggle('no-anim',!val);if(typeof toast==='function')toast(val?'Animazioni attive':'Animazioni ridotte');}
        });
      },60);
    };
  }
  // CSS per "no-anim"
  if(!el('pref-anim-css')){const st=document.createElement('style');st.id='pref-anim-css';st.textContent='body.no-anim *{animation:none!important;transition:none!important}';document.head.appendChild(st);}
})();


/* ════════════════════════════════════════════════════════════

   Su schermi stretti gli overlay 3D (.cl-hero-info / .h3d-info) erano

    .studio-hero3d canvas{height:240px!important;border-radius:var(--radius-lg);border:1px solid var(--line);box-shadow:var(--shadow);
      background:radial-gradient(125% 95% at 50% 10%, #F7F7F7 0%, #CFCFCF 46%, #888 100%)}
    .studio-hero3d .h3d-info{position:static!important;left:auto;right:auto;bottom:auto;display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:12px;margin-top:12px}
    .studio-hero3d .h3d-pct{font-size:30px!important}

    /* finanze e griglie account: sempre 1 colonna su stretti */
    .fin-summary{grid-template-columns:1fr!important}
    .acct-grid{grid-template-columns:1fr!important}

    /* la status card "flight" non deve sforare */
    .status-card{padding:18px 16px 16px}
    .sc-end{max-width:44%}
    .sc-city,.sc-time{max-width:100%}
  }

  /* schermi molto stretti: ulteriore sicurezza */
  @media(max-width:400px){
    .cl-stage,.studio-hero3d canvas{height:210px}

  document.head.appendChild(st);

/* assicura che lo Smart Animate Text sia applicato ai numeri anche dopo i render del cliente */
(function(){
  if(typeof renderClientPortal!=='function'||typeof smartText!=='function')return;
  const _rcp=renderClientPortal;
  renderClientPortal=function(){
    const out=_rcp.apply(this,arguments);
    setTimeout(()=>{
      try{
        document.querySelectorAll('.cl-pct, .status-card .sc-remain').forEach(elm=>{
          const txt=elm.textContent.trim();
          if(elm._smartVal!==txt) smartText(elm,txt);
        });
      }catch(e){}
    },40);
    return out;
  };
})();
