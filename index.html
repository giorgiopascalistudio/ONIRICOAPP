}

/* ═══════════════════ MODELLO 3D "ONIRICO" ═══════════════════ */
const DREAM_STAGES=[
  {key:'sito',       min:0,   label:'Sopralluogo & Rilievo'},
  {key:'fondazioni', min:15,  label:'Fondazioni'},
  {key:'struttura',  min:32,  label:'Struttura'},
  {key:'muri',       min:50,  label:'Murature'},
  {key:'tetto',      min:68,  label:'Copertura'},
  {key:'infissi',    min:84,  label:'Infissi & dettagli'},
  {key:'finita',     min:100, label:'Casa finita'}
];
function dreamStageForPct(pc){let s=DREAM_STAGES[0];for(const st of DREAM_STAGES)if(pc>=st.min)s=st;return s;}

function mountDream(pc){
  const host=el('cl-stage');if(!host)return;
  if(_dream){_dream.destroy();_dream=null;}
  try{
    if(typeof THREE==='undefined')throw new Error('three not loaded');
    _dream=createDream(host);
    _dream.setProgress(pc);
  }catch(e){
    host.innerHTML=`<div style="position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:24px"><div>${ico('home')}<div style="font-family:var(--serif);font-size:20px;font-weight:600;margin-top:8px">${pc}% completato</div><div style="font-size:13px;color:var(--muted);margin-top:4px">${esc(dreamStageForPct(pc).label)}</div></div></div>`;
  }
}

/* Engine 3D generalizzato: riceve una "scena" {stages:[{key,label,transient?}], build(ctx)} */
function createDream(host,scene){
  const W=()=>host.clientWidth||host.offsetWidth||600, H=()=>host.clientHeight||host.offsetHeight||440;
  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(2,window.devicePixelRatio||1));
  renderer.setSize(W(),H());
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  if(renderer.outputColorSpace!==undefined&&THREE.SRGBColorSpace)renderer.outputColorSpace=THREE.SRGBColorSpace;
  else if(THREE.sRGBEncoding)renderer.outputEncoding=THREE.sRGBEncoding;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.28;
  host.innerHTML='';host.appendChild(renderer.domElement);

  const scene3=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(38,W()/H(),0.1,200);
  camera.position.set(0,5,12.4);camera.lookAt(0,1.6,0);

  scene3.add(new THREE.HemisphereLight(0xffffff,0xbdbdbd,0.66));
  scene3.add(new THREE.AmbientLight(0xffffff,0.16));
  const key=new THREE.DirectionalLight(0xffffff,1.9);key.position.set(8,15,9);
  key.castShadow=true;key.shadow.mapSize.set(2048,2048);
  key.shadow.camera.near=1;key.shadow.camera.far=60;
  key.shadow.camera.left=-14;key.shadow.camera.right=14;key.shadow.camera.top=14;key.shadow.camera.bottom=-14;
  key.shadow.bias=-0.0004;key.shadow.radius=3;key.shadow.normalBias=0.02;scene3.add(key);
  const fill=new THREE.DirectionalLight(0xffffff,0.5);fill.position.set(-9,6,4);scene3.add(fill);
  const rim=new THREE.DirectionalLight(0xffffff,0.8);rim.position.set(-7,8,-9);scene3.add(rim);

  const pivot=new THREE.Group();scene3.add(pivot);

  function mk(color,o){o=o||{};return new THREE.MeshStandardMaterial({color:color,roughness:o.rough!==undefined?o.rough:0.7,metalness:o.metal||0,emissive:o.emit!==undefined?o.emit:0xffffff,emissiveIntensity:0,transparent:true,opacity:1});}
  const M={white:()=>mk(0xf0f0f0,{rough:.62}),soft:()=>mk(0xc9c9c9,{rough:.8}),glass:()=>mk(0xb6c2c8,{rough:.16,metal:.1,emit:0x8a9398}),accent:()=>mk(0x2a2a2a,{rough:.4,emit:0x1f1f1f}),dark:()=>mk(0x2e2e2e,{rough:.42,metal:.12,emit:0x222222}),green:()=>mk(0x707070,{rough:.5,emit:0x3a3a3a}),gold:()=>mk(0x9a9a9a,{rough:.4,metal:.18,emit:0x6a6a6a}),brick:()=>mk(0x8f8f8f,{rough:.76}),wood:()=>mk(0x6b6b6b,{rough:.6})};

  // terreno
  const ground=new THREE.Mesh(new THREE.CylinderGeometry(11,11,0.4,64),mk(0xdadada,{rough:.96,emit:0x000000}));
  ground.position.y=-0.2;ground.receiveShadow=true;ground.material.opacity=1;ground.material.transparent=false;pivot.add(ground);

  // gruppi per fase
  const n=scene.stages.length;
  scene.stages.forEach((s,i)=>{s._min=(i===0)?0:(i===n-1?100:Math.round(i*100/(n-1)));s._next=(i<n-1)?Math.round((i+1)*100/(n-1)):101;if(i===n-2)s._next=100;});
  const groups={};scene.stages.forEach(s=>{const g=new THREE.Group();g.userData={key:s.key,cur:0,target:0,seeded:false,transient:!!s.transient};groups[s.key]=g;pivot.add(g);});

  // ctx per i builder di scena
  const ctx={
    THREE:THREE,M:M,
    box:(w,h,d,mat)=>new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat||M.white()),
    cyl:(r,h,seg,mat)=>new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,seg||16),mat||M.white()),
    cone:(r,h,seg,mat)=>new THREE.Mesh(new THREE.ConeGeometry(r,h,seg||16),mat||M.white()),
    sph:(r,mat)=>new THREE.Mesh(new THREE.SphereGeometry(r,18,18),mat||M.white()),
    ico:(r,mat)=>new THREE.Mesh(new THREE.IcosahedronGeometry(r,0),mat||M.white()),
    plane:(w,d,mat)=>{const m=new THREE.Mesh(new THREE.BoxGeometry(w,0.06,d),mat||M.white());return m;},
    prism:(w,h,depth,mat)=>{const sh=new THREE.Shape();sh.moveTo(-w/2,0);sh.lineTo(w/2,0);sh.lineTo(0,h);sh.closePath();const g=new THREE.ExtrudeGeometry(sh,{depth:depth,bevelEnabled:false});g.translate(0,0,-depth/2);return new THREE.Mesh(g,mat||M.white());},
    part:(key,mesh,castRecv)=>{if(!groups[key])return mesh;mesh.castShadow=castRecv!==false;mesh.receiveShadow=castRecv!==false;mesh.userData.baseY=mesh.position.y;groups[key].add(mesh);return mesh;},
    raw:(key,obj)=>{if(!groups[key])return obj;obj.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;o.material=o.material||M.white();o.userData.baseY=o.position.y;}});groups[key].add(obj);return obj;}
  };
  try{scene.build(ctx);}catch(e){console.error('scene build',e);}

  // opacità iniziale 0 su tutti i gruppi di fase
  Object.values(groups).forEach(g=>g.traverse(o=>{if(o.isMesh){o.material.transparent=true;o.material.opacity=0;}}));

  // aure "sogno"
  const auraTex=(function(){const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');const g=x.createRadialGradient(64,64,0,64,64,64);g.addColorStop(0,'rgba(250, 250, 250,0.95)');g.addColorStop(0.4,'rgba(238, 238, 238,0.5)');g.addColorStop(1,'rgba(238, 238, 238,0)');x.fillStyle=g;x.fillRect(0,0,128,128);return new THREE.CanvasTexture(c);})();
  const auras=[];
  function spawnAura(center,size){const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:auraTex,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false,opacity:0}));sp.position.copy(center);sp.scale.setScalar(size*0.4);pivot.add(sp);auras.push({sp,t:0,dur:1.15,size});}
  function gCenter(g){const b=new THREE.Box3().setFromObject(g);const c=new THREE.Vector3();if(isFinite(b.min.x))b.getCenter(c);else c.set(0,1.5,0);return c;}
  function gSize(g){const b=new THREE.Box3().setFromObject(g);if(!isFinite(b.min.x))return 3;const s=new THREE.Vector3();b.getSize(s);return Math.max(s.x,s.y,s.z);}

  // particelle
  const pTex=(function(){const c=document.createElement('canvas');c.width=c.height=64;const x=c.getContext('2d');const g=x.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,'rgba(250, 250, 250,1)');g.addColorStop(1,'rgba(250, 250, 250,0)');x.fillStyle=g;x.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);})();
  const PCOUNT=140;const pgeo=new THREE.BufferGeometry();const pos=new Float32Array(PCOUNT*3);const spd=new Float32Array(PCOUNT);
  for(let i=0;i<PCOUNT;i++){pos[i*3]=(Math.random()-0.5)*22;pos[i*3+1]=Math.random()*10;pos[i*3+2]=(Math.random()-0.5)*22;spd[i]=0.15+Math.random()*0.35;}
  pgeo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const points=new THREE.Points(pgeo,new THREE.PointsMaterial({map:pTex,size:0.14,transparent:true,opacity:0.55,depthWrite:false,blending:THREE.AdditiveBlending,color:0xfff3e2}));
  scene3.add(points);

  // interazione
  let targetPct=0,azim=0.5,elev=0.16,azimV=0,dragging=false,lastX=0,lastY=0,autoRot=true,idleT=0;
  const dom=renderer.domElement;
  const onDown=(e)=>{dragging=true;autoRot=false;idleT=0;const p=e.touches?e.touches[0]:e;lastX=p.clientX;lastY=p.clientY;};
  const onMove=(e)=>{if(!dragging)return;const p=e.touches?e.touches[0]:e;const dx=(p.clientX-lastX)/W();const dy=(p.clientY-lastY)/H();lastX=p.clientX;lastY=p.clientY;azim-=dx*3.2;azimV=-dx*3.2;elev=Math.max(-0.05,Math.min(0.6,elev+dy*1.6));if(e.cancelable)e.preventDefault();};
  const onUp=()=>{dragging=false;idleT=0;};
  dom.addEventListener('mousedown',onDown);window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  dom.addEventListener('touchstart',onDown,{passive:true});dom.addEventListener('touchmove',onMove,{passive:false});dom.addEventListener('touchend',onUp);

  function setProgress(pc){
    targetPct=Math.max(0,Math.min(100,pc));
    scene.stages.forEach(s=>{const g=groups[s.key];let tgt=(targetPct>=s._min)?1:0;if(s.transient&&targetPct>=s._next)tgt=0;if(tgt===1&&g.userData.cur<0.02&&!g.userData.seeded){spawnAura(gCenter(g),gSize(g));g.userData.seeded=true;}if(tgt===0)g.userData.seeded=false;g.userData.target=tgt;});
  }

  let raf,last=performance.now(),alive=true;
  function frame(now){
    if(!alive)return;
    const dt=Math.min(0.05,(now-last)/1000);last=now;
    idleT+=dt;if(!dragging&&idleT>2.2)autoRot=true;
    if(autoRot)azim+=dt*0.16; else {azim+=azimV*dt*4;azimV*=Math.pow(0.0001,dt);}
    pivot.rotation.y=azim;pivot.rotation.x=0;
    camera.position.set(0,4.4+elev*7+Math.sin(now/2600)*0.16,12.4);
    camera.lookAt(0,1.6,0);
    scene.stages.forEach(s=>{const g=groups[s.key];const u=g.userData;u.cur+=(u.target-u.cur)*Math.min(1,dt*4.5);const o=u.cur;g.visible=o>0.005;g.traverse(m=>{if(m.isMesh){const base=(m.userData.maxOpacity!==undefined?m.userData.maxOpacity:1);m.material.opacity=o*base;m.material.emissiveIntensity=(1-o)*0.6;const by=m.userData.baseY||0;m.position.y=by+(1-o)*0.18;}});g.scale.setScalar(0.94+0.06*o);});
    for(let i=auras.length-1;i>=0;i--){const a=auras[i];a.t+=dt;const k=a.t/a.dur;if(k>=1){pivot.remove(a.sp);a.sp.material.dispose();auras.splice(i,1);continue;}a.sp.material.opacity=Math.sin(Math.min(1,k)*Math.PI)*0.7;a.sp.scale.setScalar(a.size*(0.4+k*1.7));}
    const arr=pgeo.attributes.position.array;
    for(let i=0;i<PCOUNT;i++){arr[i*3+1]+=spd[i]*dt;if(arr[i*3+1]>10){arr[i*3+1]=0;arr[i*3]=(Math.random()-0.5)*22;arr[i*3+2]=(Math.random()-0.5)*22;}}
    pgeo.attributes.position.needsUpdate=true;points.rotation.y+=dt*0.02;
    renderer.render(scene3,camera);
    raf=requestAnimationFrame(frame);
  }
  raf=requestAnimationFrame(frame);

  const ro=new ResizeObserver(()=>{const w=W(),h=H();if(w&&h){renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}});
  ro.observe(host);

  function destroy(){
    alive=false;cancelAnimationFrame(raf);try{ro.disconnect();}catch(e){}
    dom.removeEventListener('mousedown',onDown);window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);
    dom.removeEventListener('touchstart',onDown);dom.removeEventListener('touchmove',onMove);dom.removeEventListener('touchend',onUp);
    scene3.traverse(o=>{if(o.isMesh){o.geometry&&o.geometry.dispose();if(o.material){o.material.map&&o.material.map.dispose&&o.material.map.dispose();o.material.dispose&&o.material.dispose();}}});
    auraTex.dispose();pTex.dispose();renderer.dispose();
    if(dom.parentNode)dom.parentNode.removeChild(dom);
  }
  return {setProgress,destroy};
}

/* ═══════════════════ SCENE 3D PER TIPO DI PRATICA ═══════════════════ */
const SCENES={
  /* NUOVA COSTRUZIONE / ARCHITETTONICO — si costruisce da zero */
  house:{stages:[{key:'sito',label:'Sopralluogo & rilievo',transient:true},{key:'fond',label:'Fondazioni'},{key:'str',label:'Struttura'},{key:'muri',label:'Murature'},{key:'tetto',label:'Copertura'},{key:'inf',label:'Infissi & dettagli'},{key:'fin',label:'Casa finita'}],
  build(c){const M=c.M,BW=6.4,BD=5.4,WH=3,SLAB=0.4,WT=0.18;
    [[-BW/2,-BD/2],[-BW/2,BD/2],[BW/2,-BD/2],[BW/2,BD/2]].forEach(([x,z])=>{const s=c.cyl(0.04,0.95,8);s.position.set(x,0.47,z);c.part('sito',s);const cap=c.sph(0.09,M.accent());cap.position.set(x,0.98,z);c.part('sito',cap);});
    const cord=(x1,z1,x2,z2)=>{const dx=x2-x1,dz=z2-z1,len=Math.hypot(dx,dz);const m=c.box(len,0.02,0.02);m.position.set((x1+x2)/2,0.92,(z1+z2)/2);m.rotation.y=Math.atan2(dz,dx);c.part('sito',m,false);};
    cord(-BW/2,-BD/2,BW/2,-BD/2);cord(BW/2,-BD/2,BW/2,BD/2);cord(BW/2,BD/2,-BW/2,BD/2);cord(-BW/2,BD/2,-BW/2,-BD/2);
    const tri=new c.THREE.Group();[0,120,240].forEach(a=>{const leg=c.cyl(0.035,1.5,8);leg.position.set(0.28,0.72,0);leg.rotation.z=0.18;const lg=new c.THREE.Group();lg.add(leg);lg.rotation.y=a*Math.PI/180;tri.add(lg);});const head=c.cyl(0.12,0.34,16);head.position.y=1.5;tri.add(head);const eye=c.sph(0.08,M.dark());eye.position.set(0,1.55,0.1);tri.add(eye);tri.position.set(BW/2+2,0,BD/2+1.2);c.raw('sito',tri);
    const slab=c.box(BW,SLAB,BD);slab.position.y=SLAB/2;c.part('fond',slab);

const BUILTIN_MODEL={'arch-completo':'house','ristrutturazione':'house','impianto-elettrico':'electrical','fotovoltaico':'solar','catastale':'cadastral','bando':'generic','ape':'energy'};
function modelFromName(s){s=(s||'').toLowerCase();if(/elettric/.test(s))return 'electrical';if(/fotovolta|solare|pannell/.test(s))return 'solar';if(/catast|docfa|pregeo/.test(s))return 'cadastral';if(/energ|\bape\b|diagnosi/.test(s))return 'energy';if(/ristruttur|costruz|architett|edil|villa|casa|abitaz/.test(s))return 'house';return 'generic';}
function dreamModelFor(p){if(!p)return 'house';if(p.model3d&&SCENES[p.model3d])return p.model3d;const tid=p.templateId;if(tid&&BUILTIN_MODEL[tid])return BUILTIN_MODEL[tid];const tm=tid&&state.templates[tid];if(tm&&tm.model3d&&SCENES[tm.model3d])return tm.model3d;return modelFromName((tm&&tm.name)||p.templateName||p.name);}
function activeDreamModel(){const pid=state.client.activePid;const p=pid&&state.projects[pid];return p?dreamModelFor(p):'house';}
function dreamStageInfo(model,pc){const sc=SCENES[model]||SCENES.generic;const st=sc.stages;const n=st.length;let cur=st[0];st.forEach((s,i)=>{const min=(i===0)?0:(i===n-1?100:Math.round(i*100/(n-1)));if(pc>=min)cur=s;});return cur;}
dreamStageForPct=function(pc){return dreamStageInfo(activeDreamModel(),pc);};
mountDream=function(pc){const host=el('cl-stage');if(!host)return;if(_dream){_dream.destroy();_dream=null;}try{if(typeof THREE==='undefined')throw new Error('no three');const model=activeDreamModel();_dream=createDream(host,SCENES[model]||SCENES.generic);_dream.setProgress(pc);}catch(e){host.innerHTML=`<div style="position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:24px"><div>${ico('building')}<div style="font-family:var(--serif);font-size:20px;font-weight:600;margin-top:8px">${pc}% completato</div><div style="font-size:13px;color:var(--muted);margin-top:4px">${esc(dreamStageForPct(pc).label)}</div></div></div>`;}};

  [/struttural/,'Ingegnere'],

  [/direzione lavori|tracciament|collaud|demolizion|opere edili|finitur|montaggio|posa|verifich/,'Direzione Lavori'],
  [/comput|metric/,'Computi'],
  [/contabilit|business plan|preventiv|rendicontaz|giustificativ|costi/,'Amministrazione'],
  [/architettonic|render|modellazion|capitolat|layout|\b2d\b|\b3d\b/,'Architetto'],
  [/pratic|scia|cila|permesso|notific|agibilit|autorizzazion|nulla osta|deposit|domanda|piattaform|bando|conformit/,'Pratiche']
];
function defaultRoleByTitle(title){const t=(title||'').toLowerCase();for(const[re,r]of ROLE_RULES)if(re.test(t))return r;return null;}
function userFns(u){return Array.isArray(u.functions)?u.functions:(u.functions?Object.keys(u.functions):[]);}
function findUserByFunction(fn){if(!fn)return null;const e=Object.entries(state.users).find(([,u])=>u.active!==false&&['admin','manager','staff'].includes(u.role)&&userFns(u).includes(fn));return e?e[0]:null;}
function autoAssignTasks(phases){Object.values(phases).forEach(ph=>Object.values(ph.tasks||{}).forEach(t=>{const r=t.role||defaultRoleByTitle(t.title);if(r){t.role=r;if(!t.assignee){const u=findUserByFunction(r);if(u)t.assignee=u;}}}));}

/* ═══════════════════ NOTE + ALLEGATI PER TASK (in projectsInternal/taskMeta) ═══════════════════ */
function taskMeta(projId,phId,tId){const pm=state.projectsInternal[projId];return (pm&&pm.taskMeta&&pm.taskMeta[phId]&&pm.taskMeta[phId][tId])||{};}
function taskMetaCounts(projId,phId,tId){const m=taskMeta(projId,phId,tId);const att=m.attachments?Object.keys(m.attachments).length:0;return{att,note:!!(m.note&&m.note.trim())};}

/* ═══════════════════ OVERRIDE: editor attività progetto (ruolo + note + allegati) ═══════════════════ */
openPtaskEditor=function(projId,phId,tId){
  const editing=!!tId;const p=state.projects[projId];const ph=p.phases[phId];const t=editing?ph.tasks[tId]:{};
  const meta=editing?taskMeta(projId,phId,tId):{};
  const fnOpts=(sel)=>'<option value="">— Nessuna —</option>'+MANSIONI.map(m=>`<option value="${m}" ${m===sel?'selected':''}>${m}</option>`).join('');
  const renderAtt=()=>{const m=editing?taskMeta(projId,phId,tId):{};const a=m.attachments||{};const items=Object.entries(a);return items.length?items.map(([k,f])=>`<div class="att-row"><div class="ai">${ico('file')}</div><div class="am"><b>${esc(f.name)}</b><small>${f.size?(Math.round(f.size/1024)+' KB'):''}${f.by&&state.users[f.by]?' · '+esc(state.users[f.by].name):''}</small></div><a class="icon-btn" href="${esc(f.url)}" target="_blank" rel="noopener" title="Apri">${ico('chevR')}</a><button class="icon-btn danger" data-delatt="${k}" title="Elimina">${ico('trash')}</button></div>`).join(''):'<p style="color:var(--muted-2);font-size:12.5px;margin:0 0 8px">Nessun allegato.</p>';};
  openModal({
    title:editing?'Modifica attività':'Nuova attività',subtitle:esc(ph.name),wide:true,
    body:`
      <div class="field"><label>Attività</label><input class="input" id="pt-title" value="${esc(t.title||'')}" placeholder="Es. Sopralluogo iniziale"/></div>
      <div class="row3">
        <div class="field"><label>Mansione</label><select class="select" id="pt-role">${fnOpts(t.role||'')}</select></div>
        <div class="field"><label>Assegna a</label><select class="select" id="pt-assignee">${userOptions(t.assignee)}</select></div>
        <div class="field"><label>Scadenza</label><input class="input" type="date" id="pt-due" value="${esc(t.due||'')}"/></div>
      </div>
      <div class="field"><label>Nota</label><textarea class="textarea" id="pt-note" placeholder="Annotazioni, riferimenti, istruzioni…">${esc(meta.note||'')}</textarea></div>
      ${editing?`<div class="field" style="margin-bottom:4px"><label>Allegati</label><div id="pt-attlist">${renderAtt()}</div>
        <label class="att-drop" id="pt-drop">${ico('plus')} Trascina o seleziona un file<input type="file" id="pt-file" style="display:none" multiple/></label>
        <div class="hint" id="pt-upstatus"></div></div>`:`<div class="hint">Salva l’attività per poter aggiungere allegati.</div>`}`,
    footer:`<button class="btn btn-ghost" data-close>Annulla</button><button class="btn btn-primary" data-save>${editing?'Salva':'Aggiungi'}</button>`,
    onWire:(root)=>{
      const refresh=()=>{if($('#pt-attlist',root))$('#pt-attlist',root).innerHTML=renderAtt();$$('[data-delatt]',root).forEach(b=>b.onclick=()=>delAtt(b.dataset.delatt));};
      const delAtt=async(k)=>{const m=taskMeta(projId,phId,tId);const f=m.attachments&&m.attachments[k];if(!f)return;try{await db.ref(`projectsInternal/${projId}/taskMeta/${phId}/${tId}/attachments/${k}`).remove();if(storage&&f.path){try{await storage.ref(f.path).delete();}catch(e){}}toast('Allegato eliminato');refresh();}catch(e){toast('Errore: '+(e.code||e.message),'err');}};
      if(editing){
        $$('[data-delatt]',root).forEach(b=>b.onclick=()=>delAtt(b.dataset.delatt));
        const drop=$('#pt-drop',root),file=$('#pt-file',root),stat=$('#pt-upstatus',root);
        drop.onclick=()=>file.click();
        const doUpload=async(files)=>{
          if(!storage){toast('Abilita Firebase Storage per gli allegati','err');return;}
          for(const f of files){
            stat.textContent='Caricamento "'+f.name+'"…';
            try{
              const safe=f.name.replace(/[^\w.\-]+/g,'_');const path=`task-files/${projId}/${phId}/${tId}/${Date.now()}_${safe}`;
              const ref=storage.ref(path);await ref.put(f);const url=await ref.getDownloadURL();
              await db.ref(`projectsInternal/${projId}/taskMeta/${phId}/${tId}/attachments`).push({name:f.name,size:f.size,type:f.type||'',url,path,by:state.profile.uid,at:Date.now()});
              stat.textContent='';refresh();toast('Allegato caricato');
            }catch(e){stat.textContent='';toast('Upload fallito: '+(e.code||e.message),'err');}
          }
        };
        file.onchange=()=>{if(file.files&&file.files.length)doUpload([...file.files]);file.value='';};
        drop.addEventListener('dragover',e=>{e.preventDefault();drop.style.borderColor='var(--accent)';});
        drop.addEventListener('dragleave',()=>{drop.style.borderColor='';});
        drop.addEventListener('drop',e=>{e.preventDefault();drop.style.borderColor='';if(e.dataTransfer.files.length)doUpload([...e.dataTransfer.files]);});
      }
      $('[data-save]',root).onclick=async()=>{
        const title=$('#pt-title',root).value.trim();if(!title)return toast('Inserisci un titolo','err');
        const data={title,role:$('#pt-role',root).value||null,assignee:$('#pt-assignee',root).value||null,due:$('#pt-due',root).value||null};
        const note=$('#pt-note',root).value.trim();
        try{
          let tid=tId;
          if(editing){await db.ref(`projects/${projId}/phases/${phId}/tasks/${tId}`).update(data);}
          else{data.done=false;data.order=Object.keys(ph.tasks||{}).length;const r=await db.ref(`projects/${projId}/phases/${phId}/tasks`).push(data);tid=r.key;}
          await db.ref(`projectsInternal/${projId}/taskMeta/${phId}/${tid}/note`).set(note||null);
          await db.ref('projects/'+projId+'/updatedAt').set(Date.now());
          closeModal();toast(editing?'Attività aggiornata':'Attività aggiunta');
        }catch(e){toast(e.message,'err');}
      };
    }
  });
};

/* OVERRIDE phaseBlock: badge mansione + indicatori note/allegati */
phaseBlock=function(projId,phId,ph){
  const tasks=Object.entries(ph.tasks||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
  const tot=tasks.length;
  const doneN=tasks.filter(([,t])=>t.done).length;const pc=pct(doneN,tot);
  const open=state.ui.openPhases.has(projId+'|'+phId);
  const stKey=phaseStatus(ph);const stBadge={da_fare:'b-todo',in_corso:'b-prog',completato:'b-done'}[stKey];const stLabel={da_fare:'Da fare',in_corso:'In corso',completato:'Completata'}[stKey];
  const rows=tasks.map(([tId,t])=>{
    const assignee=t.assignee&&state.users[t.assignee]?state.users[t.assignee].name:null;
    const mc=taskMetaCounts(projId,phId,tId);
    const sub=[];
    if(t.role)sub.push(`<span class="ptag">${ico('briefcase')}${esc(t.role)}</span>`);
    if(assignee)sub.push(`<span class="chip" style="padding:1px 8px;font-size:11px">${avatarEl(assignee,'avatar-xs')}${esc(assignee)}</span>`);
    if(t.due)sub.push(`<span>${ico('calendar')} ${esc(fmtDay(t.due))}</span>`);
    if(mc.att)sub.push(`<span class="chip" style="padding:1px 8px;font-size:11px">${ico('file')}${mc.att}</span>`);
    if(mc.note)sub.push(`<span title="Nota">${ico('edit')}</span>`);
    return `<div class="ptask ${t.done?'done':''}">
      <div class="chk ${t.done?'on':''}" data-ptask-toggle="${projId}|${phId}|${tId}">${ico('check')}</div>
      <div class="tx"><b>${esc(t.title)}</b>${sub.length?`<div class="sub">${sub.join('')}</div>`:''}</div>
      ${can.projects()?`<div class="acts"><button class="icon-btn" data-ptask-edit="${projId}|${phId}|${tId}">${ico('edit')}</button><button class="icon-btn danger" data-ptask-del="${projId}|${phId}|${tId}">${ico('trash')}</button></div>`:''}
    </div>`;
  }).join('');
  return `<div class="phase ${open?'open':''}" data-phase="${projId}|${phId}">
    <div class="phase-h" data-phase-toggle="${projId}|${phId}">
      <div class="num">${(ph.order||0)+1}</div>
      <div class="tt"><b>${esc(ph.name)}</b><div class="pp"><div class="prog ${pc===100?'full':''}"><span style="width:${pc}%"></span></div><small>${doneN}/${tot}</small><span class="badge ${stBadge}" style="font-size:10.5px">${stLabel}</span></div></div>
      ${can.projects()?`<button class="icon-btn" data-phase-menu="${projId}|${phId}" style="margin-right:2px">${ico('dots')}</button>`:''}
      ${ico('chevD','chev')}
    </div>
    <div class="phase-body">${rows||`<div style="padding:14px 0;color:var(--muted-2);font-size:13px">Nessuna attività in questa fase.</div>`}${can.projects()?`<div class="add-task-row"><button class="btn btn-sm btn-soft" data-add-ptask="${projId}|${phId}">${ico('plus')}Aggiungi attività</button></div>`:''}</div>
  </div>`;
};

/* OVERRIDE viewDashboard: aggiunge "Le mie attività" (task di progetto assegnati all’utente) */
const _viewDashboard=viewDashboard;
viewDashboard=function(){let html=_viewDashboard.apply(this,arguments);return html+myTasksWidget();};
function myTasksWidget(){
  const me=state.profile&&state.profile.uid;if(!me)return '';
  const items=[];
  Object.entries(state.projects).forEach(([pid,p])=>{Object.entries(p.phases||{}).forEach(([phId,ph])=>{Object.entries(ph.tasks||{}).forEach(([tId,t])=>{if(t.assignee===me&&!t.done)items.push({pid,p,ph,t});});});});
  if(!items.length)return '';
  items.sort((a,b)=>String(a.t.due||'9999').localeCompare(String(b.t.due||'9999')));
  const rows=items.slice(0,12).map(it=>`<a class="mt-row" href="#progetto/${it.pid}">
     <div class="mt-ic">${ico(it.p.icon||'folder')}</div>
     <div class="mt-tx"><b>${esc(it.t.title)}</b><small>${esc(it.p.name)} · ${esc(it.ph.name)}</small></div>
     ${it.t.role?`<span class="ptag">${esc(it.t.role)}</span>`:''}
     ${it.t.due?`<span class="chip" style="padding:2px 9px;font-size:11px">${ico('calendar')}${esc(fmtDay(it.t.due))}</span>`:''}
   </a>`).join('');
  return `<div class="section-h" style="margin-top:24px"><h2>Le mie attività</h2><span class="sub">${items.length} da completare</span></div>
   <div class="card"><div class="card-pad" style="padding:7px">${rows}</div></div>`;
}

/* —— helper agenda —— */
function myUid(){return state.profile&&state.profile.uid;}
function isInternalBoss(){return ['admin','manager'].includes(role());}

/* task di progetto "appiattiti" con id sintetico per l'agenda */
function projTaskItems(){
  const out=[];
  Object.entries(state.projects||{}).forEach(([pid,p])=>{
    Object.entries(p.phases||{}).forEach(([phId,ph])=>{
      Object.entries(ph.tasks||{}).forEach(([tId,t])=>{
        out.push({id:`p::${pid}::${phId}::${tId}`,title:t.title,date:t.due||null,time:null,assignee:t.assignee||null,projectId:pid,done:!!t.done,frequency:'once',priority:'media',role:t.role||null,_proj:true});
      });
    });
  });
  return out;
}

/* override tasksOn: unisce task studio (/tasks) + eventi personali (/tasks con owner) + task di progetto, con filtro scope/tipo */
const _tasksOn_orig=tasksOn;
tasksOn=function(iso){
  const me=myUid();
  // Calendario/Dashboard sono SEMPRE personali: ognuno vede solo i propri task.
  // - task di progetto: quelli assegnati a me
  // - task liberi (/tasks): quelli assegnati a me o creati da me
  let std=Object.entries(state.tasks||{}).map(([id,t])=>({id,...t})).filter(t=>occursOn(t,iso))
    .filter(t=>t.assignee===me||t.owner===me||(!t.assignee&&(t.createdBy===me||t.owner===me)));
  let proj=projTaskItems().filter(t=>t.date===iso&&t.assignee===me);
  return [...std,...proj].sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99')||(({alta:0,media:1,bassa:2}[a.priority||'media'])-({alta:0,media:1,bassa:2}[b.priority||'media'])));
};

/* routing del toggle/modifica per i task di progetto dentro l'agenda */
const _toggleTask_orig=toggleTask;
toggleTask=async function(taskId,iso){
  if(typeof taskId==='string'&&taskId.startsWith('p::')){const[,pid,phId,tId]=taskId.split('::');return togglePtask(pid,phId,tId);}
  return _toggleTask_orig(taskId,iso);
};
const _openTaskEditor_orig=openTaskEditor;
openTaskEditor=function(taskId,presetDate){
  if(typeof taskId==='string'&&taskId.startsWith('p::')){const[,pid,phId,tId]=taskId.split('::');return openPtaskEditor(pid,phId,tId);}
  return _openTaskEditor_orig(taskId,presetDate);
};

/* —— router esteso: gestisce finanze/documenti/persona —— */
const _render_orig=render;
render=function(){
  if(typeof clearDelegates==='function')clearDelegates();
  if(state.user&&state.profile&&state.profile.role!=='cliente'){
    const r=state.route;
    if(r==='finanze'||r==='documenti'||r==='persona'){
      if(!el('view')){el('app').innerHTML=shellHTML();wireShell();}
      if(typeof updateChrome==='function')updateChrome();
      if(!state.ready){el('view').innerHTML='<div class="boot" style="height:50vh"><span class="spinner"></span></div>';return;}
      const v=el('view');v.classList.remove('fadein');void v.offsetWidth;v.classList.add('fadein');
      try{
        if(r==='finanze'){if(!isInternalBoss()){location.hash='#dashboard';return;}v.innerHTML=viewFinanze();wireFinanze();}
        else if(r==='documenti'){v.innerHTML=viewDocumentiHub();wireDocumentiHub();}
        else if(r==='persona'){v.innerHTML=viewPersona(state.param);wirePersona(state.param);}
      }catch(e){console.error(e);v.innerHTML='<div class="empty" style="padding:40px">'+ico('alert')+'<b>Errore di caricamento</b><p>'+esc(e.message)+'</p></div>';}
      return;
    }
  }
  return _render_orig();
};

subscribeData=function(){
  _subscribeData_ext();

    bindExtra('documents','documents');

function numIt(v){return Number(String(v==null?'':v).replace(/\./g,'').replace(',','.'))||0;}

async function uploadDocument(pid,file,kind){
  if(!storage)throw new Error('Storage non attivo');
  const safe=file.name.replace(/[^\w.\-]+/g,'_');
  const path=`documents/${pid}/${Date.now()}_${safe}`;
  const ref=storage.ref(path);await ref.put(file);const url=await ref.getDownloadURL();

function wireDocumentiHub(){
  const pid=state.param;
  if(!pid)return;
  const file=el('doc-file'),stat=el('doc-upstatus');
  const up=async(files)=>{
    if(!storage){toast('Abilita Firebase Storage','err');return;}
    for(const f of files){stat.textContent='Caricamento "'+f.name+'"…';try{await uploadDocument(pid,f,'allegato');stat.textContent='';toast('Documento caricato');}catch(e){stat.textContent='';toast('Upload fallito: '+(e.code||e.message),'err');}}

function viewPersona(uid){
  const u=state.users[uid];
  if(!u)return `<div class="empty" style="padding:40px">${ico('user')}<b>Account non trovato</b><p>Questo account non esiste più.</p><a class="btn btn-soft" href="#team" style="margin-top:14px">Torna al Team</a></div>`;

  const head=`<a class="back-link" href="${back}">${ico('chevL')} Indietro</a>
    <div class="persona-head">
      <div class="ph-av">${avatarEl(u.name,'avatar-xl')}</div>
      <div class="ph-tx"><h2>${esc(u.name)}</h2><div class="ph-sub"><span class="badge ${ROLE_BADGE[u.role]||'b-todo'}">${ROLE_LABEL[u.role]||u.role}</span>${u.title?`<span class="chip">${esc(u.title)}</span>`:''}${u.active===false?'<span class="badge b-canc">Disattivato</span>':''}</div>
      <div class="ph-contacts">${u.email?`<span>${ico('mail')}${esc(u.email)}</span>`:''}${u.telefono?`<span>${ico('phone')}${esc(u.telefono)}</span>`:''}</div></div>
    </div>`;
  if(u.role==='cliente'){
    const projs=projectsOfClient(uid);
    const cards=projs.length?projs.map(p=>{const{done,tot}=projTaskCounts(p);const pc=pct(done,tot);return `<a class="proj-card" href="#progetto/${p.id}"><div class="pc-top"><div class="pic">${ico(p.icon||'folder')}</div><span class="pct">${pc}%</span></div><b>${esc(p.name)}</b><div class="sub">${esc(p.tipoIntervento||p.templateName||'—')}</div><div class="prog ${pc===100?'full':''}" style="margin-top:10px"><span style="width:${pc}%"></span></div></a>`;}).join(''):`<div class="empty" style="padding:30px">${ico('folder')}<b>Nessun progetto collegato</b></div>`;
    return `${head}<div class="section-h" style="margin-top:22px"><h2>Progetti del cliente</h2></div><div class="acct-grid">${cards}</div>`;
  }
  // membro interno: carico di lavoro
  const fns=Array.isArray(u.functions)?u.functions:(u.functions?Object.keys(u.functions):[]);
  const items=projTaskItems().filter(t=>t.assignee===uid);
  const open=items.filter(t=>!t.done);const done=items.filter(t=>t.done);
  const byProj={};items.forEach(t=>{(byProj[t.projectId]=byProj[t.projectId]||[]).push(t);});
  const today=todayISO();
  const overdue=open.filter(t=>t.date&&t.date<today);
  const wl=items.length?Math.round(done.length/items.length*100):0;
  const projBlocks=Object.entries(byProj).map(([pid,ts])=>{
    const p=state.projects[pid];if(!p)return '';
    const d=ts.filter(t=>t.done).length;
    const rows=ts.sort((a,b)=>String(a.date||'9999').localeCompare(String(b.date||'9999'))).map(t=>`<div class="ptask ${t.done?'done':''}">
      <div class="chk ${t.done?'on':''}" data-toggle="${t.id}" data-iso="${today}">${ico('check')}</div>
      <div class="tx"><b>${esc(t.title)}</b><div class="sub">${t.role?`<span class="ptag">${esc(t.role)}</span>`:''}${t.date?`<span ${t.date<today&&!t.done?'style="color:var(--red);font-weight:700"':''}>${ico('calendar')} ${esc(fmtDay(t.date))}</span>`:''}</div></div>
    </div>`).join('');
    return `<div class="card" style="margin-bottom:14px"><div class="card-pad">
      <div class="section-h" style="margin-bottom:10px"><h2 style="font-size:15px"><a class="seg-link" href="#progetto/${pid}">${esc(p.name)}</a></h2><span class="sub">${d}/${ts.length}</span></div>${rows}</div></div>`;
  }).join('');
  return `${head}
  ${fns.length?`<div class="fn-grid" style="margin:16px 0">${fns.map(f=>`<span class="fn-chip on" style="cursor:default">${esc(f)}</span>`).join('')}</div>`:''}
  <div class="stats" style="margin-bottom:18px">
    <div class="stat"><div class="ic ic-a">${ico('clock')}</div><div class="n">${open.length}</div><div class="l">Attività aperte</div></div>
    <div class="stat"><div class="ic ic-c">${ico('check')}</div><div class="n">${done.length}</div><div class="l">Completate</div></div>
    <div class="stat"><div class="ic ic-d">${ico('alert')}</div><div class="n">${overdue.length}</div><div class="l">In ritardo</div></div>
    <div class="stat"><div class="ic ic-b">${ico('trend')}</div><div class="n">${wl}%</div><div class="l">Avanzamento</div></div>
  </div>
  <div class="section-h"><h2>Lavorazioni assegnate</h2></div>
  ${projBlocks||`<div class="empty" style="padding:30px">${ico('checkCircle')}<b>Nessuna attività assegnata</b><p>Assegna mansioni o attività per popolare la sua agenda.</p></div>`}`;
}

/* ═══════════════════ MESSAGGI (thread persistente studio ↔ cliente) ═══════════════════ */
function projMsgs(pid){const m=state.projectMessages&&state.projectMessages[pid];return m?Object.entries(m).map(([id,x])=>({id,...x})).sort((a,b)=>(a.at||0)-(b.at||0)):[];}
function msgWhen(at){if(!at)return '';const d=new Date(at);return relDay(isoDate(at))+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function msgThreadHTML(pid,viewerIsClient){
  const msgs=projMsgs(pid);
  if(!msgs.length)return `<div class="msg-empty">${ico('msg')}<div style="margin-top:6px">Nessun messaggio. ${viewerIsClient?'Scrivi allo studio per domande o richieste.':'Scrivi al cliente: vedrà i messaggi nel suo portale.'}</div></div>`;
  return msgs.map(m=>{
    const fromClient=m.role==='cliente';
    const mine=viewerIsClient?fromClient:!fromClient;
    return `<div class="msg-row ${mine?'mine':''}"><div class="msg-bubble">${esc(m.text)}</div><div class="msg-meta">${esc(m.name||(fromClient?'Cliente':'Studio'))} · ${esc(msgWhen(m.at))}</div></div>`;
  }).join('');
}
async function sendMessage(pid,text,viewerIsClient,prof){
  text=(text||'').trim();if(!text)return false;
  const p=prof||state.profile;
  await db.ref('projectMessages/'+pid).push({from:p.uid,role:viewerIsClient?'cliente':role(),name:p.name,text,at:Date.now()});
  return true;
}

  ]}

function anagSummary(pid){
  const a=(state.projects[pid]&&state.projects[pid].anagrafica)||{};
  const c=a.committente||{},im=a.immobile||{},iv=a.intervento||{};
  const filled=Object.values(a).reduce((n,sec)=>n+Object.values(sec||{}).filter(v=>v&&String(v).trim()).length,0);
  const items=[];
  if(c.denominazione)items.push(['Committente',c.denominazione+(c.codiceFiscale?' · '+c.codiceFiscale:'')]);
  if(im.comuneCat||im.foglio)items.push(['Immobile',`${im.comuneCat||''}${im.foglio?' · Fg '+im.foglio:''}${im.particella?' Part. '+im.particella:''}${im.sub?' Sub '+im.sub:''}`]);
  if(iv.oggetto)items.push(['Oggetto',iv.oggetto]);
  return {filled,items};
}

function openAnagrafica(pid){
  const p=state.projects[pid];if(!p)return;
  const a=p.anagrafica||{};
  const sec=(s)=>`<div class="anag-sec"><div class="section-h" style="margin:6px 0 10px"><h2 style="font-size:15px">${ico(s.ic)} ${s.t}</h2></div><div class="anag-grid">${s.f.map(f=>{
    const val=esc((a[s.g]&&a[s.g][f.k])||'');
    const span=f.w===2?'grid-column:1/-1':(f.w===1?'grid-column:span 2':'');
    return `<div class="field" style="${span}"><label>${f.l}</label><input class="input" id="an-${s.g}-${f.k}" type="${f.ty||'text'}" value="${val}" placeholder="${f.ph||''}"/></div>`;
  }).join('')}</div></div>`;
  openModal({
    wide:true,title:'Dati pratica',subtitle:'Anagrafica per la compilazione dei moduli',
    body:`<div class="anag-wrap">${ANAG_SCHEMA.map(sec).join('')}<p class="hint" style="margin-top:4px">Questi dati popoleranno automaticamente i moduli (CILA, SCIA, PdC, paesaggistica, ecc.) nella prossima fase.</p></div>
      <style>.anag-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px 12px}.anag-sec{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line-soft)}.anag-sec:last-of-type{border-bottom:0}@media(max-width:680px){.anag-grid{grid-template-columns:1fr 1fr}.field[style*="span 2"],.field[style*="1/-1"]{grid-column:1/-1!important}}</style>`,
    footer:`<button class="btn btn-ghost" data-close>Annulla</button><button class="btn btn-primary" data-save>Salva dati</button>`,
    onWire:(root)=>{
      $('[data-save]',root).onclick=async()=>{
        const out={};
        ANAG_SCHEMA.forEach(s=>{out[s.g]={};s.f.forEach(f=>{const v=($('#an-'+s.g+'-'+f.k,root).value||'').trim();if(v)out[s.g][f.k]=v;});});
        try{await db.ref('projects/'+pid+'/anagrafica').set(out);await db.ref('projects/'+pid+'/updatedAt').set(Date.now());closeModal();toast('Dati pratica salvati');}catch(e){toast('Errore: '+(e.code||e.message),'err');}
      };
    }
  });
}

/* ═══════════════════ SEZIONI EXTRA NEL DETTAGLIO PROGETTO ═══════════════════ */
function extraProjectSections(pid){
  const p=state.projects[pid];if(!p)return '';
  const boss=isInternalBoss();
  const{done,tot}=projTaskCounts(p);const pc=pct(done,tot);
  const stage=(typeof dreamStageForPct==='function')?dreamStageForPct(pc):{label:''};
  // 3D
  const hero3d=`<div class="studio-hero3d" id="pd-hero3d"><div class="h3d-info"><div><div class="h3d-lbl">${ico('sparkle')} ${esc(stage.label)}</div><div class="h3d-pct">${pc}%</div></div></div></div>`;
  // anagrafica
  const a=anagSummary(pid);
  const anagCard=`<div class="card" style="margin-bottom:16px"><div class="card-pad">
    <div class="section-h" style="margin-bottom:10px"><h2 style="font-size:16px">${ico('doc')} Dati pratica</h2><div class="right">${boss?`<button class="btn btn-sm btn-soft" data-anag="${pid}">${ico('edit')}${a.filled?'Modifica':'Compila'}</button>`:''}</div></div>
    ${a.items.length?`<div class="pd-meta" style="margin:0">${a.items.map(([k,v])=>`<div class="m"><div class="k">${esc(k)}</div><div class="v">${esc(v)}</div></div>`).join('')}</div><div class="hint" style="margin-top:8px">${a.filled} campi compilati</div>`:`<p style="color:var(--muted-2);font-size:13px;margin:0">Nessun dato inserito. ${boss?'Compila i dati anagrafici per preparare i moduli.':''}</p>`}
  </div></div>`;
  // finanze progetto
  let finCard='';
  if(boss){
    const list=projFinList(pid);
    const inc=list.filter(e=>e.kind==='entrata').reduce((s,e)=>s+numIt(e.amount),0);
    const out=list.filter(e=>e.kind==='uscita').reduce((s,e)=>s+numIt(e.amount),0);
    const saldo=inc-out;
    const rows=list.length?list.map(e=>`<div class="att-row"><div class="ai" style="background:${e.kind==='entrata'?'var(--green-soft)':'var(--red-soft)'};color:${e.kind==='entrata'?'var(--green)':'var(--red)'}">${ico('euro')}</div><div class="am"><b>${esc(e.desc)}</b><small>${esc(fmtDay(e.date))} · ${esc(e.category||'')}</small></div><span style="font-weight:700;color:${e.kind==='entrata'?'var(--green)':'var(--red)'};white-space:nowrap">${e.kind==='entrata'?'+':'−'} ${eur(e.amount)}</span><button class="icon-btn danger" data-pfin-del="${pid}::${e.id}">${ico('trash')}</button></div>`).join(''):'<p style="color:var(--muted-2);font-size:13px;margin:0 0 4px">Nessun movimento sul progetto.</p>';
    finCard=`<div class="card" style="margin-bottom:16px"><div class="card-pad">
      <div class="section-h" style="margin-bottom:10px"><h2 style="font-size:16px">${ico('wallet')} Finanze cantiere</h2><div class="right"><button class="btn btn-sm btn-primary" data-pfin-new="${pid}">${ico('plus')}Movimento</button></div></div>
      <div class="fin-summary" style="margin-bottom:14px"><div class="fin-kpi"><div><div class="l">Entrate</div><div class="v" style="color:var(--green);font-size:17px">${eur(inc)}</div></div></div><div class="fin-kpi"><div><div class="l">Uscite</div><div class="v" style="color:var(--red);font-size:17px">${eur(out)}</div></div></div><div class="fin-kpi fin-saldo"><div><div class="l">Saldo</div><div class="v" style="color:${saldo>=0?'var(--green)':'var(--red)'};font-size:17px">${eur(saldo)}</div></div></div></div>
      ${rows}
    </div></div>`;
  }
  // documenti progetto (compatto)
  const docs=projDocs(pid).slice(0,5);
  const docCard=`<div class="card" style="margin-bottom:16px"><div class="card-pad">
    <div class="section-h" style="margin-bottom:10px"><h2 style="font-size:16px">${ico('file')} Documenti</h2><div class="right"><a class="btn btn-sm btn-soft" href="#documenti/${pid}">Apri sezione</a><label class="btn btn-sm btn-primary" style="cursor:pointer;margin-left:6px">${ico('upload')}Carica<input type="file" id="pd-doc-file" multiple style="display:none"/></label></div></div>
    <div id="pd-doc-status" class="hint" style="margin-bottom:8px"></div>
    ${docs.length?docs.map(d=>`<div class="att-row"><div class="ai">${ico(d.kind==='modulo'?'doc':'file')}</div><div class="am"><b>${esc(d.name)}</b><small>${d.byName?esc(d.byName)+' · ':''}${esc(fmtDay(isoDate(d.at)))}</small></div><a class="icon-btn" href="${esc(d.url)}" target="_blank" rel="noopener">${ico('download')}</a></div>`).join(''):'<p style="color:var(--muted-2);font-size:13px;margin:0">Nessun documento. Carica allegati o moduli redatti.</p>'}
  </div></div>`;
  // conversazione cliente
  const msgCard=`<div class="card" style="margin-bottom:16px"><div class="card-pad">
    <div class="section-h" style="margin-bottom:10px"><h2 style="font-size:16px">${ico('msg')} Conversazione con il cliente</h2></div>
    <div class="msg-thread" id="pd-thread">${msgThreadHTML(pid,false)}</div>
    ${p.clientUid?`<div class="msg-composer"><textarea class="textarea" id="pd-msg-in" placeholder="Scrivi un messaggio al cliente…"></textarea><button class="btn btn-primary" id="pd-msg-send">${ico('send')}</button></div>`:'<p class="hint" style="margin-top:10px">Collega un account cliente per chattare.</p>'}
  </div></div>`;
  return `<div class="section-h" style="margin-top:26px"><h2>Avanzamento</h2></div>${(typeof projectStatusCard==='function'?projectStatusCard(pid):'')}
    <div class="section-h" style="margin-top:22px"><h2>Cantiere 3D</h2><span class="sub">${esc(stage.label)}</span></div>${hero3d}
    <div style="height:18px"></div>${anagCard}${finCard}${docCard}${msgCard}`;
}
function mountStudioHero(pid){
  const host=el('pd-hero3d');if(!host)return;
  if(window._pdDream){try{window._pdDream.destroy();}catch(e){}window._pdDream=null;}
  const p=state.projects[pid];if(!p)return;const{done,tot}=projTaskCounts(p);const pc=pct(done,tot);
  try{
    if(typeof THREE==='undefined'||typeof createDream!=='function')throw new Error('no3d');
    const model=(typeof dreamModelFor==='function')?dreamModelFor(p):'house';
    window._pdDream=createDream(host,SCENES[model]||SCENES.generic);window._pdDream.setProgress(pc);
  }catch(e){host.querySelector('.h3d-info')||(host.innerHTML='');}
}
function wireProjectExtra(pid){
  if(!pid||!state.projects[pid])return;
  mountStudioHero(pid);
  delegate('[data-anag]',(t)=>openAnagrafica(t.dataset.anag));
  delegate('[data-pfin-new]',(t)=>openFinEditor(t.dataset.pfinNew,null));
  delegate('[data-pfin-del]',(t)=>{const[p,id]=t.dataset.pfinDel.split('::');confirmDialog({title:'Eliminare il movimento?',message:'Operazione non reversibile.',confirmLabel:'Elimina',danger:true,onConfirm:async()=>{await db.ref('projects/'+p+'/finance/'+id).remove();toast('Eliminato');}});});
  const file=el('pd-doc-file'),stat=el('pd-doc-status');
  if(file)file.onchange=async()=>{if(!file.files.length)return;if(!storage){toast('Abilita Firebase Storage','err');return;}for(const f of file.files){stat.textContent='Caricamento "'+f.name+'"…';try{await uploadDocument(pid,f,'allegato');stat.textContent='';toast('Caricato');}catch(e){stat.textContent='';toast('Upload fallito: '+(e.code||e.message),'err');}}file.value='';};
  const send=el('pd-msg-send'),inp=el('pd-msg-in');
  if(send&&inp){const go=async()=>{if(await sendMessage(pid,inp.value,false)){inp.value='';}};send.onclick=go;inp.onkeydown=(e)=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))go();};}
  const th=el('pd-thread');if(th)th.scrollTop=th.scrollHeight;
}
/* aggancio additivo a viewProjectDetail / wireProjectDetail */
(function(){
  const _vpd=viewProjectDetail;
  viewProjectDetail=function(){const html=_vpd.apply(this,arguments);const id=state.param;if(!id||!state.projects[id])return html;try{return html+extraProjectSections(id);}catch(e){console.error(e);return html;}};
  const _wpd=wireProjectDetail;
  wireProjectDetail=function(){_wpd.apply(this,arguments);try{wireProjectExtra(state.param);}catch(e){console.error(e);}};
})();

/* ═══════════════════ PORTALE CLIENTE: documenti + messaggi ═══════════════════ */
function clientInjectExtras(previewProfile){
  const pid=state.client.activePid;if(!pid)return;
  const prof=previewProfile||state.profile;
  const ro=!!_previewMode;
  const body=document.querySelector('.cl-body');if(!body)return;
  const foot=body.querySelector('.cl-foot');
  const docs=projDocs(pid);
  const docHTML=docs.length?docs.map(d=>`<div class="att-row"><div class="ai">${ico(d.kind==='modulo'?'doc':'file')}</div><div class="am"><b>${esc(d.name)}</b><small>${esc(fmtDay(isoDate(d.at)))}</small></div><a class="icon-btn" href="${esc(d.url)}" target="_blank" rel="noopener">${ico('download')}</a></div>`).join(''):'<p style="color:var(--muted-2);font-size:13px;margin:0">Nessun documento ancora disponibile.</p>';
  const wrap=document.createElement('div');
  wrap.innerHTML=`
    <div class="card cl-docs" style="margin-top:18px"><div class="card-pad">
      <div class="section-h" style="margin-bottom:10px"><h2 style="font-size:16px">${ico('file')} Documenti</h2>${ro?'':`<div class="right"><label class="btn btn-sm btn-primary" style="cursor:pointer">${ico('upload')}Carica<input type="file" id="cl-doc-file" multiple style="display:none"/></label></div>`}</div>
      <div id="cl-doc-status" class="hint" style="margin-bottom:8px"></div>
      ${docHTML}
      <div class="hint" style="margin-top:8px">Puoi caricare e scaricare i documenti, ma non eliminarli.</div>
    </div></div>
    <div class="card" style="margin-top:16px;margin-bottom:8px"><div class="card-pad">
      <div class="section-h" style="margin-bottom:10px"><h2 style="font-size:16px">${ico('msg')} Messaggi con lo studio</h2></div>
      <div class="msg-thread" id="cl-thread">${msgThreadHTML(pid,true)}</div>
      ${ro?'<p class="hint" style="margin-top:10px">Anteprima: invio disattivato.</p>':`<div class="msg-composer"><textarea class="textarea" id="cl-msg-in" placeholder="Scrivi allo studio una domanda o richiesta…"></textarea><button class="btn btn-primary" id="cl-msg-send">${ico('send')}</button></div>`}
    </div></div>`;
  if(foot)body.insertBefore(wrap,foot);else body.appendChild(wrap);
  // wire
  const th=el('cl-thread');if(th)th.scrollTop=th.scrollHeight;
  if(!ro){
    const file=el('cl-doc-file'),stat=el('cl-doc-status');
    if(file)file.onchange=async()=>{if(!file.files.length)return;if(!storage){toast('Caricamento non disponibile','err');return;}for(const f of file.files){stat.textContent='Caricamento "'+f.name+'"…';try{await uploadDocument(pid,f,'allegato');stat.textContent='';toast('Documento caricato');}catch(e){stat.textContent='';toast('Upload fallito','err');}}file.value='';};
    const send=el('cl-msg-send'),inp=el('cl-msg-in');
    if(send&&inp){const go=async()=>{if(await sendMessage(pid,inp.value,true,prof)){inp.value='';}};send.onclick=go;inp.onkeydown=(e)=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))go();};}
  }
}
(function(){
  if(typeof renderClientPortal!=='function')return;
  const _rcp=renderClientPortal;
  renderClientPortal=function(previewProfile){_rcp.apply(this,arguments);try{clientInjectExtras(previewProfile);}catch(e){console.error(e);}};
  if(typeof bindClientProjects==='function'){
    const _bcp=bindClientProjects;
    bindClientProjects=function(ids){
      _bcp.apply(this,arguments);
      state.projectMessages=state.projectMessages||{};state.documents=state.documents||{};
      (ids||[]).forEach(pid=>{
        const mref=db.ref('projectMessages/'+pid);const mcb=mref.on('value',s=>{state.projectMessages[pid]=s.val()||{};try{renderClientPortal();}catch(e){}},e=>{});_clientListeners.push(()=>mref.off('value',mcb));
        const dref=db.ref('documents/'+pid);const dcb=dref.on('value',s=>{state.documents[pid]=s.val()||{};try{renderClientPortal();}catch(e){}},e=>{});_clientListeners.push(()=>dref.off('value',dcb));
      });
    };
  }
})();



/* ════════════════════════════════════════════════════════════
   ████  UNIFICAZIONE "Team" + "Clienti" in un'unica voce con tab  ████
   ════════════════════════════════════════════════════════════ */
(function(){
  // 1) rimuovo la voce di menu "Clienti": ora è una scheda dentro "Team"
  const ci=NAV.findIndex(n=>n.id==='clienti');
  if(ci>=0)NAV.splice(ci,1);
  state.ui.peopleTab=state.ui.peopleTab||'team';

  // 2) CSS delle schede
  if(!el('people-tabs-css')){
    const s=document.createElement('style');s.id='people-tabs-css';
    s.textContent=`.people-tabs{display:inline-flex;gap:6px;background:var(--surface-2);border:1px solid var(--line-soft);padding:5px;border-radius:var(--radius-pill);margin:-2px 0 18px}
    .people-tabs .ptab-btn{display:inline-flex;align-items:center;gap:7px;border:0;background:transparent;color:var(--muted);font-weight:700;font-size:13.5px;padding:8px 16px;border-radius:var(--radius-pill);cursor:pointer;transition:all .2s var(--ease);-webkit-tap-highlight-color:rgba(0,0,0,0)}
    .people-tabs .ptab-btn svg{width:16px;height:16px}
    .people-tabs .ptab-btn.on{background:var(--accent);color:var(--accent-ink);box-shadow:0 4px 12px -4px rgba(0,0,0,.28)}`;
    document.head.appendChild(s);
  }

  // 3) la vista "team" mostra le due schede + il contenuto della scheda attiva
  const _vTeam=viewTeam;
  viewTeam=function(){
    const tab=state.ui.peopleTab==='clienti'?'clienti':'team';
    const tabs=`<div class="people-tabs">
      <button type="button" class="ptab-btn ${tab==='team'?'on':''}" data-ptab="team">${ico('users')} Team</button>
      <button type="button" class="ptab-btn ${tab==='clienti'?'on':''}" data-ptab="clienti">${ico('contact')} Clienti</button>
    </div>`;
    let content;
    try{content=(tab==='clienti'&&typeof viewClients==='function')?viewClients():_vTeam.call(this);}
    catch(e){console.error(e);content='<div class="empty" style="padding:30px">'+ico('alert')+'<b>Errore</b><p>'+esc(e.message)+'</p></div>';}
    return tabs+content;
  };
  const _wTeam=wireTeam;
  wireTeam=function(){
    delegate('[data-ptab]',(t)=>{state.ui.peopleTab=t.dataset.ptab;render();});
    if(state.ui.peopleTab==='clienti'){if(typeof wireClients==='function')wireClients();}
    else{_wTeam.apply(this,arguments);}
  };

  // 4) titolo e pulsante "in alto" seguono la scheda attiva
  const _vt=viewTitle;
  viewTitle=function(){
    if(state.route==='team')return state.ui.peopleTab==='clienti'?['Team','Clienti e portale']:['Team','Membri dello studio'];
    return _vt.apply(this,arguments);
  };
  const _ta=renderTopActions;
  renderTopActions=function(){
    const c=el('top-actions');
    if(c&&state.route==='team'){
      if(state.ui.peopleTab==='clienti'&&can.clients()){c.innerHTML=`<button class="btn btn-primary" data-act="new-client">${ico('plus')}Nuovo cliente</button>`;return;}
      if(state.ui.peopleTab!=='clienti'&&can.users()){c.innerHTML=`<button class="btn btn-primary" data-act="new-user">${ico('plus')}Nuovo account</button>`;return;}
      c.innerHTML='';return;
    }
    return _ta.apply(this,arguments);

/* ════════════════════════════════════════════════════════════
   ████  MODELLO 3D a step (.glb caricati da GitHub)  ████
   13 file step-01..step-13 che rappresentano l'avanzamento.
   Si caricano via URL (GLTFLoader). Fallback al modello procedurale
   se i file non sono raggiungibili.
   ════════════════════════════════════════════════════════════ */
(function(){
  // Base URL dei modelli: cartella "model/" accanto alla pagina (GitHub Pages).
  // Override possibile con window.MODEL_BASE.
  const MODEL_BASE = (window.MODEL_BASE||'model/');
  const STEP_COUNT = 13;
  function stepUrl(n){return MODEL_BASE+'step-'+String(n).padStart(2,'0')+'.glb';}
  // % (0..100) -> indice step (1..13)
  function stepForPct(pc){
    pc=Math.max(0,Math.min(100,pc||0));
    const idx=Math.round(pc/100*(STEP_COUNT-1))+1; // 0%→1, 100%→13
    return Math.max(1,Math.min(STEP_COUNT,idx));
  }

  if(typeof THREE==='undefined'||!THREE.WebGLRenderer)return; // niente 3D -> lascia il fallback esistente

  // Motore GLB con stessa interfaccia di createDream: {setProgress, destroy}
  function createGLBViewer(host){
    const W=()=>host.clientWidth||host.offsetWidth||600, H=()=>host.clientHeight||host.offsetHeight||440;
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,powerPreference:'high-performance'});
    renderer.setPixelRatio(Math.min(2,window.devicePixelRatio||1));
    renderer.setSize(W(),H());
    renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    if(renderer.outputColorSpace!==undefined&&THREE.SRGBColorSpace)renderer.outputColorSpace=THREE.SRGBColorSpace;
    else if(THREE.sRGBEncoding)renderer.outputEncoding=THREE.sRGBEncoding;
    renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.15;
    // preserva eventuali overlay info (.h3d-info / .cl-hero-info) invece di cancellare tutto
    [...host.querySelectorAll('canvas')].forEach(c=>c.remove());
    const _ov=host.querySelector('.h3d-info,.cl-hero-info');
    host.insertBefore(renderer.domElement, _ov||null);

    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(42,W()/H(),0.05,500);
    camera.position.set(5.4,3.6,5.4);

    // luci neutre (scala di grigi)
    scene.add(new THREE.HemisphereLight(0xffffff,0xbdbdbd,0.7));
    scene.add(new THREE.AmbientLight(0xffffff,0.25));
    const key=new THREE.DirectionalLight(0xffffff,1.7);key.position.set(8,14,9);
    key.castShadow=true;key.shadow.mapSize.set(2048,2048);
    key.shadow.camera.near=0.5;key.shadow.camera.far=80;
    key.shadow.camera.left=-20;key.shadow.camera.right=20;key.shadow.camera.top=20;key.shadow.camera.bottom=-20;
    key.shadow.bias=-0.0004;key.shadow.normalBias=0.02;scene.add(key);
    const fill=new THREE.DirectionalLight(0xffffff,0.55);fill.position.set(-9,6,4);scene.add(fill);
    const rim=new THREE.DirectionalLight(0xffffff,0.6);rim.position.set(-6,8,-9);scene.add(rim);

    // piano-ombra
    const groundMat=new THREE.ShadowMaterial({opacity:0.18});
    const ground=new THREE.Mesh(new THREE.PlaneGeometry(120,120),groundMat);
    ground.rotation.x=-Math.PI/2;ground.position.y=0;ground.receiveShadow=true;scene.add(ground);

    const pivot=new THREE.Group();scene.add(pivot);
    let current=null;            // gruppo del modello corrente
    const loader=new THREE.GLTFLoader();
    const cache={};              // step -> gltf.scene (clonato)
    let token=0;                 // per ignorare load obsoleti
    let wantStep=1, shownStep=0, loading=false;

    function frameModel(obj){
      // centra e scala OGNI modello alla STESSA dimensione visiva (fuori scala reale)
      const box=new THREE.Box3().setFromObject(obj);
      const size=box.getSize(new THREE.Vector3());
      const center=box.getCenter(new THREE.Vector3());
      let maxDim=Math.max(size.x,size.y,size.z);
      const TARGET=7.4; // dimensione visiva uniforme per tutti gli step
      if(!isFinite(maxDim)||maxDim<1e-4){ // modello vuoto/degenerato: nessuna scala
        obj.userData._empty=true; return;
      }
      const scale=TARGET/maxDim;
      obj.scale.setScalar(scale);
      // base a y=0, centrato in x,z
      obj.position.x=-center.x*scale;
      obj.position.z=-center.z*scale;
      obj.position.y=-box.min.y*scale;
      obj.traverse(o=>{if(o.isMesh){o.castShadow=true;o.receiveShadow=true;if(o.material){o.material.needsUpdate=true;}}});
    }
    function isEmptyGLTF(obj){
      let has=false;obj.traverse(o=>{if(o.isMesh)has=true;});return !has;
    }

    // primo step che contiene geometria reale (gli step iniziali possono essere vuoti)
    const FIRST_NONEMPTY=3;
    function showStep(n){
      if(shownStep===n && current) return;
      if(cache[n]){
        swapTo(cache[n]); shownStep=n; return;
      }
      const myToken=++token; loading=true; setHint('Caricamento modello…');
      loader.load(stepUrl(n),(gltf)=>{
        if(myToken!==token){return;} // un altro step è stato richiesto nel frattempo
        const obj=gltf.scene||gltf.scenes[0];
        if(isEmptyGLTF(obj) && n<FIRST_NONEMPTY){
          // step iniziale senza geometria: mostro il primo step "pieno"
          loading=false; showStep(FIRST_NONEMPTY); return;
        }
        frameModel(obj);
        cache[n]=obj;
        swapTo(obj); shownStep=n; loading=false; setHint('');
      },undefined,(err)=>{
        loading=false;
        // fallback: se non si carica, mostra il modello procedurale una volta sola
        if(!host._fellBack){host._fellBack=true; setHint(''); fallbackProcedural();}
      });
    }
    function swapTo(obj){
      if(current){pivot.remove(current);}
      current=obj; pivot.add(obj);
    }
    let _fallbackDream=null;
    function fallbackProcedural(){
      try{
        // usa il vecchio motore procedurale come ripiego
        if(typeof createDream==='function' && typeof SCENES!=='undefined'){
          // pulisci il nostro renderer
          destroy(true);
          _fallbackDream=createDream(host, SCENES[(typeof activeDreamModel==='function'?activeDreamModel():'house')]||SCENES.house);
          _fallbackDream.setProgress(lastPct);
        }
      }catch(e){}
    }

    function setHint(t){
      let h=host.querySelector('.glb-hint');
      if(!h){h=document.createElement('div');h.className='glb-hint';h.style.cssText='position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:12.5px;color:var(--muted);background:rgba(255,255,255,.7);padding:6px 12px;border-radius:99px;pointer-events:none';host.appendChild(h);}
      h.textContent=t||''; h.style.display=t?'block':'none';
    }

    // interazione: drag per ruotare, auto-rotate
    let azim=0.6, elev=0.18, azimV=0, dragging=false, lastX=0,lastY=0, autoRot=true, idleT=0;
    const dom=renderer.domElement;
    const onDown=(e)=>{dragging=true;autoRot=false;idleT=0;const p=e.touches?e.touches[0]:e;lastX=p.clientX;lastY=p.clientY;};
    const onMove=(e)=>{if(!dragging)return;const p=e.touches?e.touches[0]:e;const dx=(p.clientX-lastX)/W();const dy=(p.clientY-lastY)/H();lastX=p.clientX;lastY=p.clientY;azim-=dx*3.2;azimV=-dx*3.2;elev=Math.max(-0.15,Math.min(0.75,elev+dy*1.6));if(e.cancelable&&e.touches)e.preventDefault();};
    const onUp=()=>{dragging=false;idleT=0;};
    dom.addEventListener('mousedown',onDown);window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
    dom.addEventListener('touchstart',onDown,{passive:true});dom.addEventListener('touchmove',onMove,{passive:false});dom.addEventListener('touchend',onUp);

    let lastPct=0, raf, alive=true, last=performance.now();
    function loop(now){
      if(!alive)return;
      const dt=Math.min(0.05,(now-last)/1000);last=now;
      idleT+=dt;if(!dragging&&idleT>2.2)autoRot=true;
      if(autoRot)azim+=dt*0.22; else {azim+=azimV*dt*4;azimV*=Math.pow(0.0001,dt);}
      pivot.rotation.y=azim;
      const r=7.6;
      camera.position.x=Math.cos(azim)*r; camera.position.z=Math.sin(azim)*r; camera.position.y=3.4+elev*6+Math.sin(now/2600)*0.12;
      pivot.rotation.y=0;
      camera.lookAt(0,2.7,0);
      renderer.render(scene,camera);
      raf=requestAnimationFrame(loop);
    }
    raf=requestAnimationFrame(loop);

    const ro=new ResizeObserver(()=>{const w=W(),h=H();if(w&&h){renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();}});
    ro.observe(host);

    function setProgress(pc){
      lastPct=Math.max(0,Math.min(100,pc||0));
      if(_fallbackDream){_fallbackDream.setProgress(lastPct);return;}
      wantStep=stepForPct(lastPct);
      showStep(wantStep);
    }
    function destroy(keepHost){
      alive=false;cancelAnimationFrame(raf);try{ro.disconnect();}catch(e){}
      dom.removeEventListener('mousedown',onDown);window.removeEventListener('mousemove',onMove);window.removeEventListener('mouseup',onUp);
      dom.removeEventListener('touchstart',onDown);dom.removeEventListener('touchmove',onMove);dom.removeEventListener('touchend',onUp);
      try{scene.traverse(o=>{if(o.isMesh){o.geometry&&o.geometry.dispose&&o.geometry.dispose();}});}catch(e){}
      try{renderer.dispose();}catch(e){}
      if(_fallbackDream){try{_fallbackDream.destroy();}catch(e){}_fallbackDream=null;}
      if(!keepHost && dom.parentNode)dom.parentNode.removeChild(dom);
    }
    return {setProgress, destroy};
  }

  // Sostituisco mountDream per usare il viewer GLB (con fallback interno)
  if(typeof mountDream==='function'){
    mountDream=function(pc){
      const host=el('cl-stage');if(!host)return;
      if(_dream){try{_dream.destroy();}catch(e){}_dream=null;}
      try{
        if(typeof THREE==='undefined'||!THREE.GLTFLoader)throw new Error('no GLTFLoader');
        _dream=createGLBViewer(host);
        _dream.setProgress(pc);
      }catch(e){
        // ripiego: vecchio motore procedurale, o testo
        try{
          if(typeof createDream==='function'&&typeof SCENES!=='undefined'){
            _dream=createDream(host,SCENES[(typeof activeDreamModel==='function'?activeDreamModel():'house')]||SCENES.house);
            _dream.setProgress(pc);
          }else throw e;
        }catch(e2){
          host.innerHTML=`<div style="position:absolute;inset:0;display:grid;place-items:center;text-align:center;padding:24px"><div>${ico('home')}<div style="font-family:var(--serif);font-size:20px;font-weight:600;margin-top:8px">${pc}% completato</div><div style="font-size:13px;color:var(--muted);margin-top:4px">${esc(dreamStageForPct(pc).label)}</div></div></div>`;
        }
      }
    };
  }

  // Anche l'hero 3D nel dettaglio progetto (studio) usa il viewer GLB
  if(typeof mountStudioHero==='function'){
    mountStudioHero=function(pid){
      const host=el('pd-hero3d');if(!host)return;
      if(window._pdDream){try{window._pdDream.destroy();}catch(e){}window._pdDream=null;}
      const p=state.projects[pid];if(!p)return;const c=projTaskCounts(p);const pc=pct(c.done,c.tot);
      try{
        if(typeof THREE==='undefined'||!THREE.GLTFLoader)throw new Error('no GLTFLoader');
        window._pdDream=createGLBViewer(host);window._pdDream.setProgress(pc);
      }catch(e){
        try{
          if(typeof createDream==='function'&&typeof SCENES!=='undefined'){
            const model=(typeof dreamModelFor==='function')?dreamModelFor(p):'house';
            window._pdDream=createDream(host,SCENES[model]||SCENES.generic);window._pdDream.setProgress(pc);
          }
        }catch(e2){}
      }
    };
  }

  window.createGLBViewer=createGLBViewer; // utile per debug
})();

(function(){

  const s=document.createElement('style');s.id='statuscard-css';

  .sc-time{font-size:11px;color:#8a8a8a;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .sc-path{display:flex;align-items:center;gap:8px;margin:16px 0 14px}

  .sc-node.hollow{background:#2a2a2a;border:2px solid #7a7a7a}
  .sc-track{flex:1;height:3px;border-radius:2px;background:#333;position:relative;overflow:visible}
  .sc-track .fill{position:absolute;top:0;left:0;height:100%;width:var(--p,45%);background:linear-gradient(90deg,#fff,#cfcfcf);border-radius:2px;transition:width .9s var(--ease,ease)}
  .sc-plane{position:absolute;top:50%;left:var(--p,45%);transform:translate(-50%,-50%);z-index:3;color:#fff;display:flex;transition:left .9s var(--ease,ease)}
  .sc-plane svg{width:17px;height:17px}
  .sc-mid{display:flex;justify-content:center;margin:-2px 0 14px}
  .sc-eta{font-size:12px;color:#d0d0d0;font-weight:600;background:#262626;padding:5px 13px;border-radius:99px;white-space:nowrap}
  .sc-bottom{display:flex;justify-content:space-between;align-items:center;border-top:1px solid #2c2c2c;padding-top:14px;gap:12px}
  .sc-info{display:flex;flex-direction:column;gap:2px;min-width:0}
  .sc-info .k{font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:#7a7a7a;font-weight:700}
  .sc-info .v{font-size:13.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sc-info.right{text-align:right;align-items:flex-end}
  .sc-remain{font-size:21px;font-weight:800;letter-spacing:-.02em;color:#fff;font-variant-numeric:tabular-nums;flex:0 0 auto}
  @media(max-width:560px){.status-card{padding:18px 16px 16px}.sc-remain{font-size:18px}.sc-info .v{font-size:12.5px}}`;
  document.head.appendChild(s);

  // —— dot-matrix 3x5 ——
  const DOT={
   A:["010","101","111","101","101"],B:["110","101","110","101","110"],C:["011","100","100","100","011"],
   D:["110","101","101","101","110"],E:["111","100","110","100","111"],F:["111","100","110","100","100"],
   G:["011","100","101","101","011"],H:["101","101","111","101","101"],I:["111","010","010","010","111"],
   J:["001","001","001","101","010"],K:["101","110","100","110","101"],L:["100","100","100","100","111"],
   M:["101","111","111","101","101"],N:["101","111","111","111","101"],O:["010","101","101","101","010"],
   P:["110","101","110","100","100"],Q:["010","101","101","110","011"],R:["110","101","110","101","101"],
   S:["011","100","010","001","110"],T:["111","010","010","010","010"],U:["101","101","101","101","111"],
   V:["101","101","101","101","010"],W:["101","101","111","111","101"],X:["101","101","010","101","101"],
   Y:["101","101","010","010","010"],Z:["111","001","010","100","111"],
   "0":["111","101","101","101","111"],"1":["010","110","010","010","111"],"2":["110","001","010","100","111"],
   "3":["111","001","010","001","110"],"4":["101","101","111","001","001"],"5":["111","100","110","001","110"],
   "6":["011","100","110","101","010"],"7":["111","001","010","010","010"],"8":["010","101","010","101","010"],
   "9":["010","101","011","001","110"]," ":["000","000","000","000","000"],"-":["000","000","111","000","000"]
  };
  function dotChar(ch){const rows=DOT[ch.toUpperCase()]||DOT[" "];let cells="";for(let r=0;r<5;r++)for(let c=0;c<3;c++)cells+=`<i class="${rows[r][c]==="1"?"on":""}"></i>`;return `<span class="sc-dotchar">${cells}</span>`;}
  function dotWord(s){return `<span class="sc-dots">${[...String(s||'').slice(0,4)].map(dotChar).join("")}</span>`;}

  // codice 4 lettere da una stringa (iniziali significative)
  function codeFrom(str){
    if(!str)return '----';
    const cleaned=String(str).toUpperCase().replace(/[^A-Z0-9 ]/g,'');
    const words=cleaned.split(/\s+/).filter(Boolean);
    let code='';
    if(words.length>=2){code=words.slice(0,4).map(w=>w[0]).join('');}
    else{code=cleaned.replace(/\s/g,'').slice(0,4);}
    return (code||'----').slice(0,4).padEnd(4,' ').trim()||'----';
  }

  // genera l'HTML della status card
  window.statusCard=function(o){
    return `<div class="status-card">
      <div class="sc-top">
        <div class="sc-end">${dotWord(o.fromCode)}<span class="sc-city">${esc(o.fromCity||'')}</span><span class="sc-time">${esc(o.fromTime||'')}</span></div>
        <div class="sc-end right">${dotWord(o.toCode)}<span class="sc-city">${esc(o.toCity||'')}</span><span class="sc-time">${esc(o.toTime||'')}</span></div>
      </div>
      <div class="sc-path">
        <div class="sc-node"></div>
        <div class="sc-track"><div class="fill" style="width:${o.progress}%"></div><div class="sc-plane" style="left:${o.progress}%"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 12l-9 3-2 6-2-9-9-2 22-7z"/></svg></div></div>
        <div class="sc-node hollow"></div>
      </div>
      <div class="sc-mid"><span class="sc-eta">${esc(o.eta||'')}</span></div>
      <div class="sc-bottom">
        <div class="sc-info"><span class="k">${esc(o.nextLabel||'Prossimo')}</span><span class="v">${esc(o.nextVal||'—')}</span></div>
        <div class="sc-remain">${o.progress}%</div>
        <div class="sc-info right"><span class="k">${esc(o.rightLabel||'Attività')}</span><span class="v">${esc(o.rightVal||'')}</span></div>
      </div>
    </div>`;
  };

  // calcola task ATTUALE → PROSSIMO (e fasi) da un progetto, poi compone la card
  window.projectStatusCard=function(pid){
    const p=state.projects[pid];if(!p)return '';
    const c=projTaskCounts(p);const pc=pct(c.done,c.tot);
    // fasi ordinate
    const phases=Object.entries(p.phases||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).map(([id,ph])=>({id,...ph}));
    // lista task piatta in ordine fase→task
    const flat=[];
    phases.forEach(ph=>{
      Object.entries(ph.tasks||{}).sort((a,b)=>(a[1].order||0)-(b[1].order||0)).forEach(([tid,t])=>flat.push({phase:ph.name,phId:ph.id,title:t.title,done:!!t.done}));
    });
    if(!flat.length){
      return statusCard({fromCode:'AVVI',fromCity:'In avvio',fromTime:p.templateName||'Progetto',toCode:'FINE',toCity:'Consegna',toTime:p.dueDate?fmtDay(p.dueDate):'da definire',eta:'In preparazione',progress:0,nextLabel:'Prossimo',nextVal:'Definizione attività',rightLabel:'Avanzamento',rightVal:'0%'});
    }
    // task attuale = primo non completato; prossimo = quello dopo
    let curIdx=flat.findIndex(t=>!t.done);
    if(curIdx===-1)curIdx=flat.length-1; // tutto completato
    const cur=flat[curIdx];
    const next=flat[curIdx+1]||null;
    // fase attuale e prossima fase
    const curPhaseIdx=phases.findIndex(ph=>ph.id===cur.phId);
    const nextPhase=phases.slice(curPhaseIdx+1).find(ph=>true)||null;
    const allDone=flat.every(t=>t.done);

    const fromCity = allDone ? 'Completato' : 'Task attuale';
    const fromTitle = cur.title;
    const toCity = next ? 'Prossimo task' : (nextPhase?'Prossima fase':'Consegna');
    const toTitle = next ? next.title : (nextPhase?nextPhase.name:(p.dueDate?fmtDay(p.dueDate):'Consegna'));
    const eta = p.dueDate ? ('Consegna '+fmtDay(p.dueDate)) : (allDone?'Lavori completati':'Consegna da definire');

    return statusCard({
      fromCode:codeFrom(cur.title), fromCity:allDone?'Completato':'Task attuale', fromTime:cur.title,
      toCode:codeFrom(toTitle), toCity:toCity, toTime:toTitle,
      eta:eta, progress:pc,
      nextLabel: next?'Prossimo task':(nextPhase?'Prossima fase':'Stato'),
      nextVal: next?next.title:(nextPhase?nextPhase.name:(allDone?'Tutto completato':'—')),
      rightLabel:'Fase attuale', rightVal:cur.phase
    });
  };
})();

  .asw:focus-visible{outline:2px solid var(--accent);outline-offset:2px}`;

  window.appleSwitch=function(o){

    if(!o.label && !o.desc)return sw;

  };

  window.wireAppleSwitches=function(root,onChange){
    root=root||document;
    [...root.querySelectorAll('.asw[data-asw]')].forEach(sw=>{
      if(sw._aswWired)return; sw._aswWired=true;
      let down=false,moved=false,startX=0,w=0,thumb=0,pad=3;
      const setOn=(v)=>{sw.classList.toggle('on',v);sw.setAttribute('aria-checked',v?'true':'false');};
